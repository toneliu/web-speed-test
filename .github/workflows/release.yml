name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - GOARCH: 386
            BINARY_NAME: speedtest-linux-386
          - GOARCH: amd64
            BINARY_NAME: speedtest-linux-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies for 386
        if: matrix.GOARCH == '386'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - name: Build Linux binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.GOARCH }}
          CGO_ENABLED: '1'
        run: |
          go build -v -o ${{ matrix.BINARY_NAME }} .
          chmod +x ${{ matrix.BINARY_NAME }}
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.BINARY_NAME }}
          path: ${{ matrix.BINARY_NAME }}

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Windows AMD64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '1'
        run: |
          go build -v -o speedtest-windows-amd64.exe .
          dir

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: speedtest-windows-amd64
          path: speedtest-windows-amd64.exe

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux 386
        uses: actions/download-artifact@v4
        with:
          name: speedtest-linux-386
          path: ./

      - name: Download Linux AMD64
        uses: actions/download-artifact@v4
        with:
          name: speedtest-linux-amd64
          path: ./

      - name: Download Windows AMD64
        uses: actions/download-artifact@v4
        with:
          name: speedtest-windows-amd64
          path: ./

      - name: List files
        run: ls -la

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            speedtest-linux-386
            speedtest-linux-amd64
            speedtest-windows-amd64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
