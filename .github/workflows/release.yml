name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - GOARCH: 386
            BINARY_NAME: speedtest-linux-386
          - GOARCH: amd64
            BINARY_NAME: speedtest-linux-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Linux binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.GOARCH }}
          CGO_ENABLED: '0'
        run: |
          go build -v -o ${{ matrix.BINARY_NAME }} .
          chmod +x ${{ matrix.BINARY_NAME }}
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.BINARY_NAME }}
          path: ${{ matrix.BINARY_NAME }}

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - GOARCH: 386
            BINARY_NAME: speedtest-windows-386.exe
          - GOARCH: amd64
            BINARY_NAME: speedtest-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Windows binary
        env:
          GOOS: windows
          GOARCH: ${{ matrix.GOARCH }}
          CGO_ENABLED: '0'
        run: |
          go build -v -o ${{ matrix.BINARY_NAME }} .
          dir

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.BINARY_NAME }}
          path: ${{ matrix.BINARY_NAME }}

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
