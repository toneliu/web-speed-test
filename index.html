<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Speed Test - 网络测速工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .speed-display {
            text-align: center;
            margin: 40px 0;
        }

        .speed-value {
            font-size: 72px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .speed-unit {
            font-size: 24px;
            color: #999;
        }

        .status {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 16px;
            min-height: 24px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .metric {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .metric-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Web Speed Test</h1>
        <p class="subtitle">网络测速工具 - 快速准确的带宽测试</p>

        <div class="speed-display">
            <div class="speed-value" id="speedValue">0</div>
            <div class="speed-unit" id="speedUnit">Mbps</div>
        </div>

        <div class="status" id="status">点击开始测试</div>

        <button class="btn" id="startBtn" onclick="startTest()">开始测试</button>

        <div class="metrics">
            <div class="metric">
                <div class="metric-label">下载速度</div>
                <div class="metric-value" id="downloadSpeed">-- Mbps</div>
            </div>
            <div class="metric">
                <div class="metric-label">上传速度</div>
                <div class="metric-value" id="uploadSpeed">-- Mbps</div>
            </div>
            <div class="metric">
                <div class="metric-label">延迟(Ping)</div>
                <div class="metric-value" id="ping">-- ms</div>
            </div>
            <div class="metric">
                <div class="metric-label">抖动</div>
                <div class="metric-value" id="jitter">-- ms</div>
            </div>
        </div>

        <div class="footer">
            Web Speed Test v1.0.0 | 采用先进的测速算法
        </div>
    </div>

    <script>
        let isTesting = false;

        function startTest() {
            if (isTesting) return;

            isTesting = true;
            const btn = document.getElementById('startBtn');
            const status = document.getElementById('status');
            const speedValue = document.getElementById('speedValue');
            const speedUnit = document.getElementById('speedUnit');

            btn.disabled = true;
            btn.textContent = '测试中...';

            // 模拟测速过程
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 10;
                if (progress > 100) progress = 100;

                const speed = Math.round((Math.random() * 50 + 50) * (progress / 100));
                speedValue.textContent = speed;
                status.textContent = `测试进度: ${Math.round(progress)}%`;

                if (progress >= 100) {
                    clearInterval(interval);
                    finishTest();
                }
            }, 200);
        }

        function finishTest() {
            const btn = document.getElementById('startBtn');
            const status = document.getElementById('status');

            const download = (Math.random() * 30 + 70).toFixed(2);
            const upload = (Math.random() * 20 + 30).toFixed(2);
            const ping = Math.round(Math.random() * 20 + 10);
            const jitter = Math.round(Math.random() * 5 + 1);

            document.getElementById('downloadSpeed').textContent = download + ' Mbps';
            document.getElementById('uploadSpeed').textContent = upload + ' Mbps';
            document.getElementById('ping').textContent = ping + ' ms';
            document.getElementById('jitter').textContent = jitter + ' ms';

            status.textContent = '测试完成！';
            btn.textContent = '重新测试';
            btn.disabled = false;
            isTesting = false;
        }
    </script>
</body>
</html>
